startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - walletPrivateKey
    properties:
      walletPrivateKey:
        type: string
        description: >-
          Dedicated low-balance Base wallet private key for x402 payments.
          Use a purpose-built wallet, not your primary wallet. $1 USDC
          runs approximately 3 full verified decision cycles.
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'coinopai-mcp'],
      env: {
        WALLET_PRIVATE_KEY: config.walletPrivateKey
      }
    })
  exampleConfig:
    walletPrivateKey: '0x...'
